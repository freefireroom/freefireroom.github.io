<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join Room - FF ROOM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        .container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }
        .card {
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 30px;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 16px;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            background: #22c55e;
            color: black;
            font-size: 16px;
        }
        .btn-secondary {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            background: #334155;
            color: white;
        }
        .upi-box {
            background: #1e293b;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin: 15px 0;
        }
        .success {
            color: #22c55e;
            text-align: center;
            margin-top: 15px;
        }
        .prize-info {
            text-align: center;
            padding: 10px;
            background: #f59e0b20;
            border-radius: 12px;
            margin-bottom: 15px;
        }
    </style>
    <script type="module">
        import { auth, onAuthStateChanged, database, ref, get, update, push, sendToTelegram } from './firebase-config.js';

        const urlParams = new URLSearchParams(window.location.search);
        const entryFee = parseInt(urlParams.get('fee')) || 45;
        const prizeAmount = entryFee === 45 ? 500 : 1500;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }
            
            document.getElementById('entryFee').innerText = entryFee;
            document.getElementById('prizeAmount').innerText = prizeAmount;
            
            window.submitPayment = async () => {
                const utr = document.getElementById('utrNumber').value.trim();
                if (!utr) {
                    alert("Please enter UTR number");
                    return;
                }
                
                const uid = user.uid;
                const userRef = ref(database, 'users/' + uid);
                const snapshot = await get(userRef);
                const userData = snapshot.val();
                
                if (userData.balance < entryFee) {
                    alert(`Insufficient balance! Need ₹${entryFee}. Please add money.`);
                    return;
                }
                
                const newBalance = userData.balance - entryFee;
                await update(ref(database, 'users/' + uid), { 
                    balance: newBalance,
                    pendingRequest: true
                });
                
                const requestId = Date.now();
                const paymentRef = ref(database, 'paymentRequests/' + requestId);
                await set(paymentRef, {
                    uid: uid,
                    email: user.email,
                    utr: utr,
                    amount: entryFee,
                    prize: prizeAmount,
                    status: 'pending',
                    timestamp: new Date().toISOString()
                });
                
                sendToTelegram(`🆕 <b>NEW ROOM REQUEST</b>\n\n👤 User: ${user.email}\n🔢 UTR: ${utr}\n💰 Entry Fee: ₹${entryFee}\n🏆 Prize: ₹${prizeAmount}\n🆔 Request ID: ${requestId}`);
                
                document.getElementById('statusMsg').innerHTML = '<p class="success">✅ Request submitted! Admin will approve and send room credentials.</p>';
                setTimeout(() => {
                    window.location.href = "home.html";
                }, 3000);
            };
        });
        
        window.goBack = () => {
            window.location.href = "home.html";
        };
    </script>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>🎮 Join Room</h2>
        
        <div class="prize-info">
            <p>Entry Fee: <strong style="color:#22c55e; font-size:24px;">₹<span id="entryFee">45</span></strong></p>
            <p>Winner Prize: <strong style="color:#facc15; font-size:20px;">₹<span id="prizeAmount">500</span></strong></p>
            <p style="font-size:12px;">⚠️ Only winner gets prize money</p>
        </div>
        
        <div class="upi-box">
            <p>📱 Send payment to this UPI ID:</p>
            <h3 style="color:#facc15;">ashish8418078@axl</h3>
            <p style="font-size: 12px; margin-top: 8px;">Pay ₹<span id="entryFee2">45</span> and enter UTR below</p>
        </div>
        
        <input type="text" id="utrNumber" placeholder="Enter UTR / Transaction ID" class="input">
        <button onclick="submitPayment()" class="btn-primary">Submit & Request Approval</button>
        <button onclick="goBack()" class="btn-secondary">← Back to Home</button>
        
        <div id="statusMsg"></div>
    </div>
</div>
</body>
</html>

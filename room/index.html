<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF ROOM - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }
        .card {
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            margin-top: 50px;
            border: 1px solid rgba(34, 197, 94, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #E5FFB3, #22c55e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #e2e8f0;
        }
        .input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 30px;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 16px;
        }
        .input:focus {
            outline: none;
            border: 2px solid #22c55e;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            background: #22c55e;
            color: black;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            background: #16a34a;
        }
        .btn-secondary {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            background: #334155;
            color: white;
            font-size: 16px;
        }
    </style>
    <script type="module">
        import { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword, database, ref, set, get } from './firebase-config.js';

        window.login = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "home.html";
            } catch (error) {
                alert(error.message);
            }
        };

        window.signup = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const uid = userCred.user.uid;
                
                await set(ref(database, 'users/' + uid), {
                    email: email,
                    balance: 0,
                    totalEarned: 0,
                    matchesPlayed: 0,
                    totalKills: 0,
                    totalWins: 0,
                    createdAt: new Date().toISOString()
                });
                
                alert("Account created successfully!");
                window.location.href = "home.html";
            } catch (error) {
                alert(error.message);
            }
        };
    </script>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🔥 FF ROOM</h1>
        <h2>Login / Signup</h2>
        <input type="email" id="email" placeholder="Email" class="input">
        <input type="password" id="password" placeholder="Password" class="input">
        <button onclick="login()" class="btn-primary">Login</button>
        <button onclick="signup()" class="btn-secondary">Create New Account</button>
    </div>
</div>
</body>
</html>

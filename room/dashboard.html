<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - FF ROOM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding-bottom: 80px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }
        .card {
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            flex: 1;
            min-width: 100px;
        }
        .stat-card span {
            font-size: 24px;
            color: #facc15;
            display: block;
            margin-top: 8px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 500px;
            margin: auto;
            background: #0f172a;
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-top: 1px solid #22c55e;
        }
        .bottom-nav button {
            background: transparent;
            color: white;
            border: none;
            font-size: 16px;
            padding: 8px;
            cursor: pointer;
        }
        .match-history-item {
            background: #1e293b;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
    </style>
    <script type="module">
        import { auth, onAuthStateChanged, database, ref, get } from './firebase-config.js';

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }
            
            const userRef = ref(database, 'users/' + user.uid);
            const snapshot = await get(userRef);
            const data = snapshot.val() || {};
            
            document.getElementById('balance').innerText = data.balance || 0;
            document.getElementById('totalEarned').innerText = data.totalEarned || 0;
            document.getElementById('totalKills').innerText = data.totalKills || 0;
            document.getElementById('totalWins').innerText = data.totalWins || 0;
            document.getElementById('matchesPlayed').innerText = data.matchesPlayed || 0;
            
            const paymentSnap = await get(ref(database, 'paymentRequests'));
            const payments = paymentSnap.val() || {};
            const userPayments = Object.entries(payments).filter(([id, p]) => p.uid === user.uid);
            
            let historyHtml = '';
            for (let [id, p] of userPayments.slice(-5).reverse()) {
                const statusIcon = p.status === 'approved' ? '✅' : (p.status === 'rejected' ? '❌' : '⏳');
                historyHtml += `
                    <div class="match-history-item">
                        <div>
                            <strong>Entry: ₹${p.amount}</strong><br>
                            Prize: ₹${p.prize || '?'}<br>
                            ${new Date(p.timestamp).toLocaleDateString()}
                        </div>
                        <div>${statusIcon} ${p.status}</div>
                    </div>
                `;
            }
            
            document.getElementById('matchHistory').innerHTML = historyHtml || '<p>No matches played yet</p>';
        });
    </script>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>📊 My Performance Dashboard</h2>
        <div class="stats-row">
            <div class="stat-card">💰 Balance<br><span id="balance">0</span></div>
            <div class="stat-card">🏆 Total Won<br><span id="totalEarned">0</span></div>
            <div class="stat-card">👑 Wins<br><span id="totalWins">0</span></div>
        </div>
        <div class="stats-row">
            <div class="stat-card">🎯 Matches<br><span id="matchesPlayed">0</span></div>
            <div class="stat-card">💀 Kills<br><span id="totalKills">0</span></div>
        </div>
    </div>
    
    <div class="card">
        <h3>📜 Match History</h3>
        <div id="matchHistory">Loading...</div>
    </div>
    
    <div class="bottom-nav">
        <button onclick="window.location.href='home.html'">🏠 Home</button>
        <button onclick="window.location.reload()">📊 Dashboard</button>
        <button onclick="window.location.href='index.html'">🚪 Logout</button>
    </div>
</div>
</body>
</html>

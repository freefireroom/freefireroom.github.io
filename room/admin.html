<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - FF ROOM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            padding-bottom: 30px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }
        .card {
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 30px;
            border: none;
            background: #1e293b;
            color: white;
            font-size: 16px;
        }
        .btn-primary {
            padding: 12px 20px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            background: #22c55e;
            color: black;
            margin-right: 10px;
        }
        .btn-danger {
            padding: 8px 16px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            background: #ef4444;
            color: white;
        }
        .btn-success {
            padding: 8px 16px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            background: #10b981;
            color: white;
        }
        .request-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
        }
        h3 {
            margin-bottom: 15px;
            color: #22c55e;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
    <script type="module">
        import { auth, onAuthStateChanged, database, ref, get, update, push, sendToTelegram } from './firebase-config.js';

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }
            
            // Admin email check
            if (user.email !== "raistar315m@gmail.com") {
                alert("Access Denied! Admin only.");
                window.location.href = "home.html";
                return;
            }
            
            document.getElementById('adminEmail').innerText = user.email;
            loadPendingRequests();
            loadUserList();
            
            setInterval(() => {
                loadPendingRequests();
            }, 5000);
        });
        
        async function loadPendingRequests() {
            const snapshot = await get(ref(database, 'paymentRequests'));
            const requests = snapshot.val() || {};
            const pending = Object.entries(requests).filter(([id, req]) => req.status === 'pending');
            
            const container = document.getElementById('pendingRequests');
            if (pending.length === 0) {
                container.innerHTML = '<p>✅ No pending requests</p>';
                return;
            }
            
            let html = '';
            for (let [id, req] of pending) {
                html += `
                    <div class="request-card">
                        <p><strong>👤 ${req.email}</strong></p>
                        <p>UTR: ${req.utr}</p>
                        <p>Entry Fee: ₹${req.amount} | Prize: ₹${req.prize}</p>
                        <p>Time: ${new Date(req.timestamp).toLocaleString()}</p>
                        <div class="flex-row">
                            <button onclick='approveRequest("${id}", "${req.uid}", ${req.amount})' class="btn-success">✅ Approve</button>
                            <button onclick='rejectRequest("${id}", "${req.uid}", ${req.amount})' class="btn-danger">❌ Reject & Refund</button>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        window.approveRequest = async (requestId, userId, amount) => {
            await update(ref(database, 'paymentRequests/' + requestId), { status: 'approved' });
            sendToTelegram(`✅ <b>Request Approved</b>\nUser ID: ${userId}\nNow send room credentials from admin panel.`);
            alert("Request approved! Now send room credentials below.");
            loadPendingRequests();
        };
        
        window.rejectRequest = async (requestId, userId, amount) => {
            const userSnap = await get(ref(database, 'users/' + userId));
            const userData = userSnap.val();
            if (userData) {
                await update(ref(database, 'users/' + userId), {
                    balance: (userData.balance || 0) + amount
                });
            }
            await update(ref(database, 'paymentRequests/' + requestId), { status: 'rejected' });
            sendToTelegram(`❌ <b>Request Rejected</b>\nUser ID: ${userId}\n₹${amount} refunded.`);
            alert("Request rejected. Amount refunded.");
            loadPendingRequests();
        };
        
        async function loadUserList() {
            const usersSnap = await get(ref(database, 'users'));
            const users = usersSnap.val() || {};
            const select = document.getElementById('userSelect');
            select.innerHTML = '<option value="">-- Select User --</option>';
            for (let uid in users) {
                const user = users[uid];
                select.innerHTML += `<option value="${uid}">${user.email} (Balance: ₹${user.balance || 0})</option>`;
            }
        }
        
        window.sendRoomToUser = async () => {
            const roomId = document.getElementById('roomId').value.trim();
            const password = document.getElementById('roomPassword').value.trim();
            const userId = document.getElementById('userSelect').value;
            
            if (!roomId || !password || !userId) {
                alert("Fill all fields and select a user");
                return;
            }
            
            await update(ref(database, 'users/' + userId), {
                approvedRoomId: roomId,
                approvedPassword: password
            });
            
            const userSnap = await get(ref(database, 'users/' + userId));
            const userEmail = userSnap.val().email;
            
            sendToTelegram(`🎮 <b>ROOM CREDENTIALS SENT</b>\n\n👤 User: ${userEmail}\n🆔 Room ID: <code>${roomId}</code>\n🔑 Password: <code>${password}</code>\n\nUser can now join the match!`);
            
            alert("Room credentials sent to user and Telegram!");
            
            document.getElementById('roomId').value = '';
            document.getElementById('roomPassword').value = '';
        };
        
        window.addBalance = async () => {
            const userId = document.getElementById('balanceUserId').value;
            const amount = parseInt(document.getElementById('addAmount').value);
            
            if (!userId || !amount) {
                alert("Select user and enter amount");
                return;
            }
            
            const userRef = ref(database, 'users/' + userId);
            const snapshot = await get(userRef);
            const userData = snapshot.val();
            
            const newBalance = (userData.balance || 0) + amount;
            await update(ref(database, 'users/' + userId), { balance: newBalance });
            
            alert(`Added ₹${amount} to user. New balance: ₹${newBalance}`);
            document.getElementById('addAmount').value = '';
            loadUserList();
        };
        
        window.logout = async () => {
            await auth.signOut();
            window.location.href = "index.html";
        };
        
        window.declareWinner = async () => {
            const userId = document.getElementById('winnerUserId').value;
            const prize = parseInt(document.getElementById('winnerPrize').value);
            
            if (!userId || !prize) {
                alert("Select user and enter prize amount");
                return;
            }
            
            const userRef = ref(database, 'users/' + userId);
            const snapshot = await get(userRef);
            const userData = snapshot.val();
            
            const newBalance = (userData.balance || 0) + prize;
            const newTotalEarned = (userData.totalEarned || 0) + prize;
            const newWins = (userData.totalWins || 0) + 1;
            
            await update(ref(database, 'users/' + userId), {
                balance: newBalance,
                totalEarned: newTotalEarned,
                totalWins: newWins
            });
            
            sendToTelegram(`🏆 <b>WINNER DECLARED!</b>\n\n👤 User: ${userData.email}\n💰 Prize: ₹${prize}\n🎉 Congratulations!`);
            
            alert(`Winner declared! ₹${prize} added to ${userData.email}`);
            loadUserList();
        };
    </script>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>🛡️ Admin Panel</h1>
        <p>Logged in as: <strong id="adminEmail">---</strong></p>
        <button onclick="logout()" class="btn-danger">Logout</button>
    </div>

    <div class="card">
        <h3>📝 Pending Room Requests</h3>
        <div id="pendingRequests">Loading...</div>
    </div>

    <div class="card">
        <h3>🎮 Send Room Credentials</h3>
        <input type="text" id="roomId" placeholder="Room ID (e.g., 123456)" class="input">
        <input type="text" id="roomPassword" placeholder="Password" class="input">
        <select id="userSelect"></select>
        <button onclick="sendRoomToUser()" class="btn-primary">📤 Send to User</button>
    </div>

    <div class="card">
        <h3>💰 Add Balance to User</h3>
        <select id="balanceUserId"></select>
        <input type="number" id="addAmount" placeholder="Amount (₹)" class="input">
        <button onclick="addBalance()" class="btn-primary">➕ Add Balance</button>
    </div>

    <div class="card">
        <h3>🏆 Declare Winner</h3>
        <select id="winnerUserId"></select>
        <input type="number" id="winnerPrize" placeholder="Prize Amount (₹)" class="input">
        <button onclick="declareWinner()" class="btn-success">👑 Declare Winner</button>
        <p class="small" style="margin-top:10px; font-size:12px; color:#f59e0b;">Bronze Match Prize: ₹500 | Diamond Match Prize: ₹1500</p>
    </div>
</div>

<script>
    // Refresh user lists periodically
    setInterval(() => {
        if (typeof loadUserList === 'function') loadUserList();
    }, 10000);
</script>
</body>
</html>
